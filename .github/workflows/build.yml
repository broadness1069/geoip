name:  Build GeoIP (R2 Distribution + GitHub Archive)
on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 5"
  push:
    branches:
      - master
    paths:
      - 'custom_tags/**'
      - 'config.json'
      - '.github/workflows/build.yml'
permissions:
  contents: write
jobs:
  build:
    name: Build, Archive and Distribute
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ./go.mod

      - name: Generate timestamp variables
        run: |
          echo "RELEASE_NAME=Released on $(date +'%Y%m%d%H%M')" >> $GITHUB_ENV
          echo "TAG_NAME=$(date +'%Y%m%d%H%M')" >> $GITHUB_ENV

      - name: Build GeoIP files
        run: |
          # 运行转换，文件会直接按照 config.json 配置的路径完美归位
          go run ./ convert -c config.json

      - name: Generate recursive checksums
        run: |
          cd output
          # 递归遍历所有文件，并在同级目录生成 .sha256sum
          find . -type f ! -name "*.sha256sum" | while read -r filepath; do
            dir=$(dirname "$filepath")
            base=$(basename "$filepath")
            (cd "$dir" && sha256sum "$base" > "${base}.sha256sum")
          done

      - name: Upload to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          aws s3 sync ./output s3://${{ secrets.R2_BUCKET_NAME }}/ \
            --endpoint-url https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com \
            --delete

      - name: Push to release branch
        run: |
          mkdir -p publish
          cp -R output/* publish/
          cd publish
          git init
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b release
          git add .
          git commit -m "${{ env.RELEASE_NAME }}"
          git remote add origin "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git push -f origin release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.RELEASE_NAME }}
          # Release 只保留这两个大文件及其校验码
          files: |
            publish/geoip.dat*
            publish/Country.mmdb*