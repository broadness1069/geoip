name:  Build GeoIP (R2 Distribution + GitHub Archive)
on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 5"
  push:
    branches:
      - master
    paths:
      - 'custom_tags/**'
      - 'config.json'
      - '.github/workflows/build.yml'
permissions:
  contents: write
jobs:
  build:
    name: Build, Archive and Distribute
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ./go.mod

      - name: Generate timestamp variables
        run: |
          echo "TAG_NAME=$(date +%Y%m%d%H%M)" >> $GITHUB_ENV
          echo "RELEASE_NAME=Released on $(date +%Y%m%d%H%M)" >> $GITHUB_ENV
        shell: bash

      - name: Build geoip files
        run: go run ./ convert -c config.json

      - name: Generate checksums
        run: |
          cd output
          for file in *; do
            if [[ -f "$file" ]]; then
              sha256sum "$file" > "${file}.sha256sum"
            fi
          done

      - name: Upload to Cloudflare R2 (Distribution)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          # --delete 参数确保 R2 上只保留最新生成的文件，与本地 output 文件夹绝对同步
          aws s3 sync ./output s3://${{ secrets.R2_BUCKET_NAME }}/ \
            --endpoint-url https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com \
            --delete

      - name: Git push assets to "release" branch
        run: |
          cd output || exit 1
          git init
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b release
          git add -A
          git commit -m "${{ env.RELEASE_NAME }}"
          git remote add geoip "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git push -f -u geoip release

      - name: Move files and push to release branch
        run: |
          mkdir -p publish
          cp -R output/* publish/
          cd publish
          git init
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b release
          git add .
          git commit -m "${{ env.RELEASE_NAME }}"
          git remote add origin "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          # 强制推送到 release 分支，保持分支轻量
          git push -f origin release

      - name: Create GitHub Release (Archive)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.RELEASE_NAME }}
          files: publish/*

